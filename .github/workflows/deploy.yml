name: Deploy to AWS ECS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: 308621094790.dkr.ecr.ap-northeast-1.amazonaws.com
  GATEWAY_IMAGE: hydra-gateway-repo
  MOCK_IMAGE: hydra-mock-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push gateway image
        run: |
          docker build -t $ECR_REGISTRY/$GATEWAY_IMAGE:latest .
          docker push $ECR_REGISTRY/$GATEWAY_IMAGE:latest

      - name: Build and push mock image
        run: |
          docker build -f Dockerfile.mock -t $ECR_REGISTRY/$MOCK_IMAGE:latest .
          docker push $ECR_REGISTRY/$MOCK_IMAGE:latest

      - name: Deploy gateway to ECS
        run: |
          aws ecs update-service \
            --cluster hydra-cluster \
            --service hydra-gateway-service \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy mock to ECS
        run: |
          aws ecs update-service \
            --cluster hydra-cluster \
            --service hydra-mock-service \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for gateway deployment
        run: |
          aws ecs wait services-stable \
            --cluster hydra-cluster \
            --services hydra-gateway-service \
            --region $AWS_REGION

      - name: Wait for mock deployment
        run: |
          aws ecs wait services-stable \
            --cluster hydra-cluster \
            --services hydra-mock-service \
            --region $AWS_REGION